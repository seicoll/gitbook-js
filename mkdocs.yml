site_name: Javascript
site_url: https://seicoll.github.io/gitbook-js/
repo_url: https://github.com/seicoll/gitbook-js

theme:
  name: material
  logo: assets/js_icon.png
  favicon: assets/js_icon.png

  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

nav:
  - Inici: README.md
  - Introducció a JavaScript:
      - Introducció: 01-introduccio/introduccio-js.md
      - Què es pot fer amb JavaScript?: 01-introduccio/que-es-pot-fer.md
      - Incloure codi JavaScript: 01-introduccio/incloure-codi-js.md
      - Sintaxi del llenguatge: 01-introduccio/sintaxi-del-llenguatge.md
      - Exercicis Introducció a JavaScript: 01-introduccio/exercici-bloc-1.md

  - Programació bàsica:
      - Variables i constants: 02-programacio-basica/variables-i-constants.md
      - Operadors: 02-programacio-basica/operadors.md
      - Condicionals i bucles: 02-programacio-basica/condicional-i-bucles.md
      - Exercicis Condicionals i bucles: 02-programacio-basica/exercicis-condicionals-i-bucles.md

  - Funcions i esdeveniments:
      - Funcions: 03-funcions-i-esdeveniments/funcions.md
      - Esdeveniments: 03-funcions-i-esdeveniments/events.md
      - Exercicis Funcions i esdeveniments: 03-funcions-i-esdeveniments/exercicis-funcions-i-esdeveniments.md

  - DOM:
      - DOM: 04-dom/dom.md
      - Exercicis DOM: 04-dom/exercicis-dom.md

  - Arrays i objectes:
      - Arrays: 05-arrays-i-objectes/arrays.md
      - Objectes: 05-arrays-i-objectes/objectes.md
      - Exercicis Arrays i objectes: 05-arrays-i-objectes/exercicis.md
      - Projecte Joc del penjat: 05-arrays-i-objectes/joc-penjat.md

  - Asíncronia:
      - Asíncronia: 06-asincronia/asincronia.md
      - Axios: 06-asincronia/axios.md
      - Exercicis: 06-asincronia/exercicis.md

  - Modularitat i Organització:
      - Modularitat i Organització: 07-modularitat/modularitat.md
      - Organització d'un projecte amb Vite: 07-modularitat/vite.md

  - Programació orientada a objectes:
      - Classe: classes/classe.md
      - Getters i setters: classes/getters-i-setters.md

  - Bibliografia i Cursos:
      - Bibliografia: bibliografia.md
